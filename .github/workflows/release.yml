name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x86_64
            ext: .exe
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
            ext: ""
          - os: macos-13
            target: x86_64-apple-darwin
            suffix: macos-x86_64
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --target ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          mkdir docx2txt-${{ matrix.suffix }}
          cp target/${{ matrix.target }}/release/docx2txt${{ matrix.ext }} docx2txt-${{ matrix.suffix }}/
          tar czf docx2txt-${{ matrix.suffix }}.tar.gz docx2txt-${{ matrix.suffix }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docx2txt-${{ matrix.suffix }}
          path: docx2txt-${{ matrix.suffix }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --generate-notes artifacts/*.tar.gz
