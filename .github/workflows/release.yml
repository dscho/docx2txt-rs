name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            targets: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
            ext: ""
          - os: windows-latest
            targets: x86_64-pc-windows-msvc
            suffix: windows-x86_64
            ext: .exe
          - os: macos-latest
            targets: aarch64-apple-darwin x86_64-apple-darwin
            suffix: macos
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        shell: bash
        run: |
          for t in ${{ matrix.targets }}; do
            rustup toolchain install stable --profile minimal --target "$t"
          done

      - name: Build release binaries
        shell: bash
        run: |
          for t in ${{ matrix.targets }}; do
            cargo build --release --target "$t"
          done

      - name: Package binaries
        shell: bash
        run: |
          for t in ${{ matrix.targets }}; do
            case "$t" in
              aarch64-apple-darwin) s=macos-arm64;;
              x86_64-apple-darwin)  s=macos-x86_64;;
              *)                    s=${{ matrix.suffix }};;
            esac
            mkdir "docx2txt-$s"
            cp "target/$t/release/docx2txt${{ matrix.ext }}" "docx2txt-$s/"
            tar czf "docx2txt-$s.tar.gz" "docx2txt-$s"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docx2txt-${{ matrix.suffix }}
          path: docx2txt-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --generate-notes artifacts/*.tar.gz
